name: release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext fakeroot binutils

      - name: Read version
        id: ver
        run: |
          V=$(cat VERSION | tr -d '[:space:]')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: check
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${{ steps.ver.outputs.tag }} already exists — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build IPK
        if: steps.check.outputs.exists == 'false'
        run: make ipk

      - name: Locate IPK artifact
        if: steps.check.outputs.exists == 'false'
        id: ipk
        run: |
          FILE=$(ls build/*.ipk | head -n1)
          test -n "$FILE"
          echo "path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.ipk.outputs.path }}
          generate_release_notes: true

      - name: Trigger feed rebuild
        if: steps.check.outputs.exists == 'false' && env.FEED_DISPATCH_TOKEN != ''
        env:
          FEED_DISPATCH_TOKEN: ${{ secrets.FEED_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $FEED_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/madoe21/enigma2-madoe21-feed/dispatches" \
            -d '{"event_type":"plugin-released","client_payload":{"repo":"${{ github.repository }}","tag":"${{ steps.ver.outputs.tag }}"}}'
